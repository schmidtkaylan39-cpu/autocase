name: Codex Auto-fix

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Repair failed CI with Codex
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_sha != '' &&
      github.event.workflow_run.head_branch != '' &&
      !startsWith(github.event.workflow_run.head_branch, 'codex/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout failed commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture failed CI context
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          mkdir -p .github/codex/context
          cp "$GITHUB_EVENT_PATH" .github/codex/context/workflow-run.json
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from "node:fs/promises";

          const repository = process.env.REPOSITORY;
          const runId = process.env.RUN_ID;
          const token = process.env.GITHUB_TOKEN;
          const eventPath = process.env.GITHUB_EVENT_PATH;
          const eventPayload = JSON.parse(await readFile(eventPath, "utf8"));
          const run = eventPayload.workflow_run ?? {};
          const response = await fetch(
            `https://api.github.com/repos/${repository}/actions/runs/${runId}/jobs?per_page=100`,
            {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28"
              }
            }
          );

          let jobsPayload = null;
          let lines = [
            "# Failed CI context",
            "",
            `- Workflow: ${run.name ?? "unknown"}`,
            `- Run ID: ${run.id ?? runId}`,
            `- Run URL: ${run.html_url ?? "unknown"}`,
            `- Event: ${run.event ?? "unknown"}`,
            `- Head branch: ${run.head_branch ?? "unknown"}`,
            `- Head SHA: ${run.head_sha ?? "unknown"}`,
            ""
          ];

          if (!response.ok) {
            lines.push(`Could not fetch failed job details from the GitHub Actions API: ${response.status} ${response.statusText}`);
          } else {
            jobsPayload = await response.json();
            const jobs = Array.isArray(jobsPayload.jobs) ? jobsPayload.jobs : [];
            const relevantJobs = jobs.filter((job) => !["success", "skipped"].includes(job.conclusion ?? ""));

            if (relevantJobs.length === 0) {
              lines.push("No failed or cancelled jobs were returned by the GitHub Actions API.");
            } else {
              for (const job of relevantJobs) {
                lines.push(`## ${job.name ?? job.id ?? "Unnamed job"}`);
                lines.push(`- Conclusion: ${job.conclusion ?? "unknown"}`);
                lines.push(`- HTML URL: ${job.html_url ?? "unknown"}`);
                const failedSteps = Array.isArray(job.steps)
                  ? job.steps.filter((step) => !["success", "skipped"].includes(step.conclusion ?? ""))
                  : [];

                if (failedSteps.length === 0) {
                  lines.push("- Non-success steps: none reported");
                } else {
                  lines.push("- Non-success steps:");
                  for (const step of failedSteps) {
                    lines.push(`  - ${step.name ?? "Unnamed step"} (${step.conclusion ?? "unknown"})`);
                  }
                }

                lines.push("");
              }
            }
          }

          await writeFile(
            ".github/codex/context/failed-jobs.md",
            `${lines.join("\n").trimEnd()}\n`,
            "utf8"
          );

          if (jobsPayload !== null) {
            await writeFile(
              ".github/codex/context/failed-jobs.json",
              `${JSON.stringify(jobsPayload, null, 2)}\n`,
              "utf8"
            );
          }
          EOF

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/fix-ci.md
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write

      - name: Prepare PR body and clean transient files
        shell: bash
        run: |
          body_file="$RUNNER_TEMP/codex-pr-body.md"
          if [ -f codex-output.md ]; then
            cp codex-output.md "$body_file"
          else
            printf '%s\n' "Codex repaired the failed CI run, but did not emit a summary file." > "$body_file"
          fi
          rm -f codex-output.md
          rm -rf .github/codex/context

      - name: Create fix PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          branch: codex/ci-autofix-${{ github.event.workflow_run.id }}-${{ github.event.workflow_run.run_attempt }}
          base: ${{ github.event.workflow_run.head_branch }}
          commit-message: "fix(ci): repair failed CI run"
          title: "fix(ci): repair failed CI on ${{ github.event.workflow_run.head_branch }}"
          body-path: ${{ runner.temp }}/codex-pr-body.md
          delete-branch: true
