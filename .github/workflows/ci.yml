name: CI

on:
  push:
  pull_request:

jobs:
  quality-matrix:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate workflows
        run: npm run validate:workflows

      - name: Build
        run: npm run build

      - name: Package smoke
        run: npm run pack:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: E2E smoke
        run: npm run test:e2e

  example-smoke-matrix:
    name: Example Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate example spec
        run: npm run validate:example

      - name: Build example plan
        run: npm run plan:example

      - name: Build example run
        run: npm run run:example

      - name: Render example report
        run: npm run report:example

      - name: Example handoff index
        run: npm run handoff:example

      - name: Example dispatch dry-run
        run: npm run dispatch:example
